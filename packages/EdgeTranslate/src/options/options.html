<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title class="i18n" data-i18n-name="SettingsTitle"></title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link type="text/css" rel="stylesheet" href="./options.css" />
    </head>

    <body>
        <div id="option">
            <header>
                <img src="../icon/icon128.png" />
                <span class="space"></span>
                <span class="space"></span>
                侧边翻译
            </header>
            <div class="content">
                <label
                    for="content-settings"
                    class="setting-title i18n"
                    data-i18n-name="ContentSettings"
                ></label>
                <div id="content-settings">
                    <div class="row">
                        <div class="column">
                            <label
                                for="source-pronunciation"
                                class="checked-label i18n"
                                data-i18n-name="SourcePronunciation"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter sPronunciation"
                                    class="checkbox"
                                    id="source-pronunciation"
                                />
                            </label>
                        </div>
                        <div class="column">
                            <label
                                for="source-pronunciation-icon"
                                class="checked-label i18n"
                                data-i18n-name="SourcePronunciationIcon"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter sPronunciationIcon"
                                    class="checkbox"
                                    id="source-pronunciation-icon"
                                />
                            </label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <label
                                for="target-pronunciation"
                                class="checked-label i18n"
                                data-i18n-name="TargetPronunciation"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter tPronunciation"
                                    class="checkbox"
                                    id="target-pronunciation"
                                />
                            </label>
                        </div>
                        <div class="column">
                            <label
                                for="target-pronunciation-icon"
                                class="checked-label i18n"
                                data-i18n-name="TargetPronunciationIcon"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter tPronunciationIcon"
                                    class="checkbox"
                                    id="target-pronunciation-icon"
                                />
                            </label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <label
                                for="original-text"
                                class="checked-label i18n"
                                data-i18n-name="OriginalText"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter originalText"
                                    class="checkbox"
                                    id="original-text"
                                />
                            </label>
                        </div>
                        <div class="column">
                            <label
                                for="detailed-meanings"
                                class="checked-label i18n"
                                data-i18n-name="DetailedMeanings"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter detailedMeanings"
                                    class="checkbox"
                                    id="detailed-meanings"
                                />
                            </label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <label
                                for="definitions"
                                class="checked-label i18n"
                                data-i18n-name="Definitions"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter definitions"
                                    class="checkbox"
                                    id="definitions"
                                />
                            </label>
                        </div>
                        <div class="column">
                            <label
                                for="examples"
                                class="checked-label i18n"
                                data-i18n-name="Examples"
                            >
                                <input
                                    type="checkbox"
                                    setting-type="switch"
                                    setting-path="TranslateResultFilter examples"
                                    class="checkbox"
                                    id="examples"
                                />
                            </label>
                        </div>
                    </div>
                </div>

                <label class="setting-title i18n" data-i18n-name="HybridTranslatorConfig"></label>
                <div class="row">
                    <div class="column">
                        <label
                            for="main-translator"
                            class="checked-label i18n"
                            data-i18n-name="MainTranslator"
                            data-insert-pos="afterBegin"
                        >
                            <select
                                id="main-translator"
                                class="translator-config"
                                data-affected="originalText mainMeaning tPronunciation sPronunciation"
                            ></select>
                        </label>
                    </div>
                    <div class="column">
                        <label
                            for="detailed-translator"
                            class="checked-label i18n"
                            data-i18n-name="DetailedTranslator"
                            data-insert-pos="afterBegin"
                        >
                            <select
                                id="detailed-translator"
                                class="translator-config"
                                data-affected="detailedMeanings"
                            ></select>
                        </label>
                    </div>
                </div>
                <div class="row">
                    <div class="column">
                        <label
                            for="definition-translator"
                            class="checked-label i18n"
                            data-i18n-name="DefinitionTranslator"
                            data-insert-pos="afterBegin"
                        >
                            <select
                                id="definition-translator"
                                class="translator-config"
                                data-affected="definitions"
                            ></select>
                        </label>
                    </div>
                    <div class="column">
                        <label
                            for="example-translator"
                            class="checked-label i18n"
                            data-i18n-name="ExampleTranslator"
                            data-insert-pos="afterBegin"
                        >
                            <select
                                id="example-translator"
                                class="translator-config"
                                data-affected="examples"
                            ></select>
                        </label>
                    </div>
                </div>

                <label class="setting-title i18n" data-i18n-name="DefaultPageTranslator"></label>
                <div class="row">
                    <div class="column">
                        <label
                            for="google-page-translator"
                            class="checked-label i18n"
                            data-i18n-name="GooglePageTranslate"
                        >
                            <input
                                type="radio"
                                value="GooglePageTranslate"
                                setting-type="radio"
                                setting-path="DefaultPageTranslator"
                                class="radio"
                                name="default-page-translator"
                                id="google-page-translator"
                            />
                        </label>
                    </div>
                </div>

                <label class="setting-title i18n" data-i18n-name="OCRSettings"></label>
                <div id="ocr-settings">
                    <div class="setting-note i18n" data-i18n-name="OCRSettingsHint"></div>
                    <div class="row">
                        <div class="column">
                            <label
                                for="ocr-lang-eng"
                                class="checked-label i18n"
                                data-i18n-name="English"
                            >
                                <input
                                    type="checkbox"
                                    value="eng"
                                    setting-type="checkbox"
                                    setting-path="OCRSettings Languages"
                                    class="checkbox"
                                    id="ocr-lang-eng"
                                />
                            </label>
                        </div>
                        <div class="column">
                            <label
                                for="ocr-lang-chi-sim"
                                class="checked-label i18n"
                                data-i18n-name="ChineseSimplified"
                            >
                                <input
                                    type="checkbox"
                                    value="chi_sim"
                                    setting-type="checkbox"
                                    setting-path="OCRSettings Languages"
                                    class="checkbox"
                                    id="ocr-lang-chi-sim"
                                />
                            </label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <label
                                for="ocr-lang-jpn"
                                class="checked-label i18n"
                                data-i18n-name="Japanese"
                            >
                                <input
                                    type="checkbox"
                                    value="jpn"
                                    setting-type="checkbox"
                                    setting-path="OCRSettings Languages"
                                    class="checkbox"
                                    id="ocr-lang-jpn"
                                />
                            </label>
                        </div>
                        <div class="column">
                            <label
                                for="ocr-lang-kor"
                                class="checked-label i18n"
                                data-i18n-name="Korean"
                            >
                                <input
                                    type="checkbox"
                                    value="kor"
                                    setting-type="checkbox"
                                    setting-path="OCRSettings Languages"
                                    class="checkbox"
                                    id="ocr-lang-kor"
                                />
                            </label>
                        </div>
                    </div>
                </div>

                <label
                    for="layout-settings"
                    class="setting-title i18n"
                    data-i18n-name="LayoutSettings"
                ></label>
                <div id="layout-settings">
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                value="resize"
                                setting-type="switch"
                                setting-path="LayoutSettings Resize"
                                class="switch"
                                id="Resize"
                            />
                            <span class="space"></span>
                            <label
                                for="Resize"
                                class="checked-label i18n"
                                data-i18n-name="ResizeSetting"
                            ></label>
                        </div>
                        <div class="column">
                            <input
                                type="checkbox"
                                value="rtl"
                                setting-type="switch"
                                setting-path="LayoutSettings RTL"
                                class="switch"
                                id="RTL"
                            />
                            <span class="space"></span>
                            <label
                                for="RTL"
                                class="checked-label i18n"
                                data-i18n-name="RTLSetting"
                            ></label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                value="FoldLongContent"
                                setting-type="switch"
                                setting-path="LayoutSettings FoldLongContent"
                                class="switch"
                                id="FoldLongContent"
                            />
                            <span class="space"></span>
                            <label
                                for="FoldLongContent"
                                class="checked-label i18n"
                                data-i18n-name="FoldLongContentSetting"
                            ></label>
                        </div>
                        <div class="column">
                            <label
                                for="select-translate-position"
                                class="checked-label i18n"
                                data-i18n-name="SelectTranslatePosition"
                                data-insert-pos="afterBegin"
                            >
                                <select
                                    setting-type="select"
                                    id="select-translate-position"
                                    value="SelectTranslatePosition"
                                    setting-path="LayoutSettings SelectTranslatePosition"
                                >
                                    <option
                                        value="TopRight"
                                        data-i18n-name="TopRight"
                                        class="i18n"
                                    ></option>
                                    <option
                                        value="TopLeft"
                                        data-i18n-name="TopLeft"
                                        class="i18n"
                                    ></option>
                                    <option
                                        value="BottomRight"
                                        data-i18n-name="BottomRight"
                                        class="i18n"
                                    ></option>
                                    <option
                                        value="BottomLeft"
                                        data-i18n-name="BottomLeft"
                                        class="i18n"
                                    ></option>
                                </select>
                            </label>
                        </div>
                    </div>
                </div>

                <label
                    for="other-settings"
                    class="setting-title i18n"
                    data-i18n-name="OtherSettings"
                ></label>
                <div id="other-settings">
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                setting-type="switch"
                                setting-path="OtherSettings SelectTranslate"
                                class="switch"
                                id="select-translate"
                            />
                            <span class="space"></span>
                            <label
                                for="select-translate"
                                class="checked-label i18n"
                                data-i18n-name="SelectTranslate"
                            ></label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                setting-type="switch"
                                setting-path="OtherSettings UsePDFjs"
                                class="switch"
                                id="use-pdf-js"
                            />
                            <span class="space"></span>
                            <label
                                for="use-pdf-js"
                                class="checked-label i18n"
                                data-i18n-name="UsePDFjs"
                            ></label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                setting-type="switch"
                                setting-path="OtherSettings TranslateAfterSelect"
                                class="switch"
                                id="translate-after-select"
                            />
                            <span class="space"></span>
                            <label
                                for="translate-after-select"
                                class="checked-label i18n"
                                data-i18n-name="TranslateAfterSelect"
                            ></label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                setting-type="switch"
                                setting-path="OtherSettings TranslateAfterDblClick"
                                class="switch"
                                id="translate-after-dbl-click"
                            />
                            <span class="space"></span>
                            <label
                                for="translate-after-dbl-click"
                                class="checked-label i18n"
                                data-i18n-name="TranslateAfterDblClick"
                            ></label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="column">
                            <input
                                type="checkbox"
                                setting-type="switch"
                                setting-path="OtherSettings CancelTextSelection"
                                class="switch"
                                id="cancel-text-selection"
                            />
                            <span class="space"></span>
                            <label
                                for="cancel-text-selection"
                                class="checked-label i18n"
                                data-i18n-name="CancelTextSelection"
                            ></label>
                        </div>
                    </div>
                </div>
            </div>
            <footer>
                <a
                    class="footer-link"
                    href="https://github.com/three-water666/EdgeTranslate"
                    target="_blank"
                    rel="noreferrer"
                >
                    <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
                        <path
                            fill="currentColor"
                            d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 4.8c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
                        ></path>
                    </svg>
                    侧边翻译
                </a>
            </footer>
        </div>
    </body>

    <script src="./options.js"></script>
</html>
