<!DOCTYPE html>
<meta charset="utf-8" />
<html>
    <head>
        <link type="text/css" rel="stylesheet" href="./popup.css" />
    </head>

    <body>
        <div class="frame">
            <div class="row">
                <input type="text" id="translate_input" autofocus="autofocus" />
                <button id="translateSubmit" class="i18n" data-i18n-name="Translate"></button>
            </div>
            <label
                id="hint_message"
                class="i18n"
                for="translate_input"
                data-i18n-name="InputHint"
            ></label>
            <div class="row" id="page-translate">
                <a id="google-page-translate" class="i18n" data-i18n-name="GooglePageTranslate"></a>
                <a id="screenshot-translate" class="i18n" data-i18n-name="ScreenshotTranslate"></a>
            </div>
            <div id="setting">
                <div class="row" style="justify-content: space-between">
                    <label
                        class="switch-label i18n"
                        for="mutual-translate"
                        data-i18n-name="MutualTranslation"
                    ></label>
                    <input type="checkbox" id="mutual-translate" class="switch" />
                </div>
                <div class="row" style="align-items: flex-end">
                    <div class="col">
                        <div class="selection">
                            <select id="sl">
                                <option
                                    class="i18n"
                                    value="auto"
                                    data-i18n-name="AutoDetect"
                                ></option>
                            </select>
                        </div>
                    </div>
                    <i
                        class="translate-icon translate-icon-exchange"
                        id="exchange"
                        title="交换两种语言"
                    ></i>
                    <div class="col">
                        <div class="selection">
                            <select id="tl"></select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row" id="setting-switch">
                <i class="translate-icon translate-icon-arrow-up set" id="arrow-up"></i>
                <i class="translate-icon translate-icon-arrow-down set" id="arrow-down"></i>
            </div>
        </div>

        <footer>
            <div class="footer-links">
                <a
                    class="footer-link"
                    href="https://github.com/three-water666/EdgeTranslate"
                    target="_blank"
                    rel="noreferrer"
                >
                    <svg class="footer-icon" viewBox="0 0 16 16" aria-hidden="true">
                        <path
                            fill="currentColor"
                            d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 4.8c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
                        ></path>
                    </svg>
                    侧边翻译
                </a>
                <a id="open-options" class="footer-link" href="#">
                    <svg class="footer-icon" viewBox="0 0 1024 1024" aria-hidden="true">
                        <path
                            fill="currentColor"
                            d="M890.53893 559.569946c2.114575-16.294021 3.482653-32.587042 3.482653-49.999309 0-17.288351-1.61691-33.582371-3.482653-49.999309l107.461589-84.078346c9.701463-7.587887 12.313703-21.393584 6.094893-32.588041l-101.864361-176.241244c-6.094893-11.192458-19.90059-15.297692-31.094048-11.192458l-126.864515 50.993639c-26.492149-20.397256-55.098873-37.187942-86.068005-49.999309L638.801558 21.392585C637.185646 9.079882 626.612771 0 613.802403 0H409.948765c-12.686452 0-23.384243 9.203798-25.000154 21.392585l-19.402926 135.072984c-31.094048 12.686452-59.575856 30.099718-86.068005 49.999309l-126.864515-50.994638c-11.815039-4.601899-24.999155 0-31.094048 11.194457L19.655755 342.90594c-6.715475 11.193458-3.481654 24.999155 6.094893 32.587042l107.46159 84.078346c-2.114575 16.293021-3.482653 33.083707-3.482653 49.999309 0 16.914602 1.61691 33.581372 3.482653 49.999309L25.626732 643.648292C15.92427 651.235179 13.313029 665.040877 19.531839 676.234334l101.864361 176.241244c6.093894 11.194457 19.90059 15.298691 31.094048 11.194457l126.864515-50.995638c26.492149 20.398255 55.097874 37.18994 86.068005 50.000309l19.401926 135.072984c1.61691 12.188787 12.189786 21.392585 25.000154 21.392585h203.852639c12.686452 0 23.383244-9.203798 25.000154-21.392585l19.401926-135.072984c31.094048-12.686452 59.576855-30.099718 86.069005-49.99931l126.864515 50.994639c11.815039 4.601899 24.999155 0 31.093049-11.194457L1003.970496 676.234334c6.094893-11.193458 3.482653-24.999155-6.093893-32.586042l-107.337673-84.078346zM511.938042 688.050372c-98.381708 0-178.355819-79.974111-178.355819-178.355819s79.974111-178.355819 178.355819-178.355818S690.293861 411.312846 690.293861 509.694553s-79.974111 178.355819-178.355819 178.355819z m0 0"
                        ></path>
                    </svg>
                    <span class="i18n" data-i18n-name="Settings"></span>
                </a>
            </div>
        </footer>
    </body>

    <script src="./popup.js"></script>
</html>
