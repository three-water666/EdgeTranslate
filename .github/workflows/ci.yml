name: CI

on:
    push:
        branches: ["master"]
    pull_request:
        branches: ["master"]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.8.1
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"
            - name: install dependencies
              run: pnpm install --frozen-lockfile
            - name: build extension for chrome
              run: pnpm build
            - name: run all tests
              run: pnpm test
